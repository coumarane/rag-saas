server {
    listen 80;

    # WebSocket upgrade map is handled via headers below

    # SSE and streaming: /api/chat/stream gets special treatment
    location /api/chat/stream {
        proxy_pass         http://api:8000/api/chat/stream;
        proxy_http_version 1.1;

        # Disable buffering for SSE
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 86400s;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE / WebSocket upgrade headers
        proxy_set_header   Connection        '';
        chunked_transfer_encoding on;
    }

    # All other API routes
    location /api/ {
        proxy_pass         http://api:8000/api/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_read_timeout 60s;
    }

    # Frontend catch-all
    location / {
        proxy_pass         http://frontend:3000/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (Next.js HMR in dev, etc.)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_read_timeout 60s;
    }
}
